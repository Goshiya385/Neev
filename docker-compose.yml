version: '3.8'

services:
  backend:
    build: ./backend
    container_name: neev-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    depends_on:
      - ml-service

  ml-service:
    build: ./ml-service
    container_name: neev-ml-service
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}

  frontend:
    build: ./frontend
    container_name: neev-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000
      - NEXT_PUBLIC_ML_URL=http://ml-service:8000
    depends_on:
      - backend
